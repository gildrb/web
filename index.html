        <style>
            :root {
                --bg: #000000;
                --text-primary: #ffffff;
                --text-secondary: #808080;
            }

            @media (prefers-color-scheme: light) {
                :root {
                    --bg: #ffffff;
                    --text-primary: #000000;
                    --text-secondary: #4D4D4D;
                }
            }

            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }

            ::selection {
                color: var(--text-primary);
                background: var(--text-secondary);
            }

            html {
                scrollbar-width: none;
                -ms-overflow-style: none;
            }

            html::-webkit-scrollbar {
                display: none;
            }

            .name {
                font-size: 24px;
                font-weight: 400;
                letter-spacing: -0.02em;
                color: var(--text-primary);
                margin-bottom: 8px;
                white-space: nowrap;
                -webkit-font-smoothing: antialiased;
                text-rendering: optimizeLegibility;
            }

            .subtitle {
                font-size: 20px;
                font-weight: 400;
                color: var(--text-secondary);
                margin-bottom: 32px;
                -webkit-font-smoothing: antialiased;
                -webkit-text-size-adjust: 100%;
                text-rendering: optimizeLegibility;
            }

            .links {
                font-size: 20px;
                font-weight: 400;
                display: flex;
                flex-direction: column;
                -webkit-font-smoothing: antialiased;
                -webkit-text-size-adjust: 100%;
                text-rendering: optimizeLegibility;
            }

            .email {
                font-size: 20px;
                font-weight: 400;
                color: var(--text-secondary);
                cursor: pointer;
                margin-top: 24px;
                margin-bottom: 8px;
                width: fit-content;
                background: none;
                border: none;
                padding: 0;
                font-family: inherit;
                text-align: left;
                -webkit-font-smoothing: antialiased;
                -webkit-text-size-adjust: 100%;
                text-rendering: optimizeLegibility;
            }

            body {
                background: var(--bg);
                color: var(--text-primary);
                font-family:
                    "Inter",
                    sans-serif;
                font-feature-settings: 'liga' 1, 'calt' 1;
                font-weight: 400;
                font-size: 18px;
                line-height: 1.5;
                min-height: 100vh;
                -webkit-font-smoothing: antialiased;
                -webkit-text-size-adjust: 100%;
                -moz-osx-font-smoothing: grayscale;
                text-rendering: optimizeLegibility;
                -webkit-overflow-scrolling: touch;
            }

            @supports (font-variation-settings: normal) {
                :root {
                    font-family:
                        InterVariable,
                        sans-serif;
                }
            }

            /* Outer wrapper to center everything */
            .wrapper {
                max-width: 1900px;
                margin: 0 auto;
                padding: 0 48px;
            }

            /* Main Layout */
            .layout {
                display: grid;
                grid-template-columns: 280px 1fr;
                min-height: 100vh;
                gap: 48px;
            }

            /* Sidebar */
            .sidebar {
                position: sticky;
                top: 0;
                height: 100vh;
                padding: 64px 0;
                display: flex;
                flex-direction: column;
                justify-content: flex-start;
                z-index: 100;
            }

        



            .links a {
                color: var(--text-secondary);
                text-decoration: none;
                margin-bottom: 8px;
                width: fit-content;
            }

            .links a::after {
                content: " ↗";
                color: var(--text-secondary);
            }

            @media (hover: hover) {
            .links a:hover,
            .links a:focus {
                color: var(--text-primary);
                outline: none;
                }
            }

            @media (hover: hover) {
                .links a:hover::after,
                .links a:focus::after {
                    color: var(--text-secondary);
                }
            }

            .email::after {
                content: "";
                color: var(--text-secondary);
                opacity: 1;
            }

            @media (hover: hover) {
            .email:hover,
            .email:focus {
                color: var(--text-primary);
                outline: none;
                }
            }   

            @media (hover: hover) {
            .email:hover::after,
            .email:focus::after {
                content: " copy";
                color: var(--text-secondary);
                }
            }

            .email.copied::after {
                content: " copied";
                color: var(--text-secondary);
            }

            /* Content Area */
            .content {
                padding: 64px 0;
            }

            .showcase {
                display: grid;
                grid-template-columns: 2.5fr 1fr;
                gap: 20px;
                margin-bottom: 120px;
                align-items: start;
            }

            .showcase-featured {
                position: sticky;
                top: 64px;
            }

            .showcase-featured .image-wrapper {
                position: relative;
                overflow: hidden;
                border-radius: 0px;
            }

            .showcase-featured img {
                width: 100%;
                height: auto;
                display: block;
                user-select: none;
                -webkit-user-drag: none;
            }

            .showcase-featured .image-wrapper::after {
                content: "";
                position: absolute;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
            }

            .showcase-scroll {
                display: flex;
                flex-direction: column;
                gap: 20px;
            }

            .showcase-scroll .image-wrapper {
                position: relative;
                overflow: hidden;
                border-radius: 0px;
            }

            .showcase-scroll img {
                width: 100%;
                height: auto;
                display: block;
                user-select: none;
                -webkit-user-drag: none;
            }

            .showcase-scroll .image-wrapper::after {
                content: "";
                position: absolute;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
            }

            /* Standard Gallery for remaining items */
            .gallery {
                display: grid;
                grid-template-columns: repeat(2, 1fr);
                gap: 20px;
                margin-bottom: 120px;
            }

            .gallery-item {
                position: relative;
                border-radius: 0px;
                overflow: hidden;
            }

            .gallery-item::after {
                content: "";
                position: absolute;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
            }

            .gallery-item.full {
                grid-column: span 2;
            }

            .gallery-item img {
                width: 100%;
                height: auto;
                display: block;
                user-select: none;
                -webkit-user-drag: none;
            }

            /* Section titles (optional) */
            .section-title {
                font-size: 16px;
                color: var(--text-secondary);
                margin-bottom: 24px;
                letter-spacing: 0.05em;
                text-transform: uppercase;
            }

            /* Accessibility */
            .sr-only {
                position: absolute;
                width: 1px;
                height: 1px;
                padding: 0;
                margin: -1px;
                overflow: hidden;
                clip: rect(0, 0, 0, 0);
                white-space: nowrap;
                border-width: 0;
            }

            /* Responsive */

            

            @media (max-width: 1400px) {
                .wrapper {
                    padding: 0 32px;
                }

                .layout {
                    gap: 32px;
                }

                .showcase {
                    grid-template-columns: 2fr 1fr;
                }
            }

            @media (max-width: 1100px) {
                .layout {
                    grid-template-columns: 240px 1fr;
                }

                .showcase {
                    grid-template-columns: 1.8fr 1fr;
                }
            }

            @media (max-width: 900px) {
                .showcase {
                    grid-template-columns: 1fr;
                }

                .showcase-featured {
                    position: relative;
                    top: 0;
                }
            }

            @media (max-width: 768px) {
                .wrapper {
                    padding: 0 24px;
                }

                .layout {
                    grid-template-columns: 1fr;
                    gap: 0;
                }

                .sidebar {
                    position: relative;
                    height: auto;
                    padding: 32px 0;
                    padding-bottom: 48px;
                }

                .name {
                    white-space: normal;
                }

                .content {
                    padding: 0 0 32px 0;
                }

                .showcase {
                    margin-bottom: 80px;
                }

                .gallery {
                    grid-template-columns: 1fr;
                    margin-bottom: 80px;
                }

                .gallery-item.full {
                    grid-column: span 1;
                }
            }
        </style>

        <script> 
            const srOnly = document.querySelector(".sr-only");

            function announce(message) {
                srOnly.textContent = message;
                setTimeout(() => {
                    srOnly.textContent = "";
                }, 1000);
            }

            // Email copy functionality
                document
                 .querySelector(".email")
                 .addEventListener("click", function () {
                     navigator.clipboard.writeText("hi@gildrb.com");
                     this.classList.add("copied");
                     this.blur();
                     announce("Email copied to clipboard");
                     setTimeout(() => this.classList.remove("copied"), 1500);
                 });

            // Disable right-click on all images
            document.querySelectorAll("img").forEach((img) => {
                img.addEventListener("contextmenu", (e) => e.preventDefault());
            });

            // Arrow key navigation
            const focusableElements = [
                document.querySelector(".email"),
                ...document.querySelectorAll(".links a"),
            ];

            document.addEventListener("keydown", function (e) {
                if (e.key !== "ArrowUp" && e.key !== "ArrowDown") return;

                e.preventDefault();

                const activeElement = document.activeElement;
                const currentIndex = focusableElements.indexOf(activeElement);

                if (currentIndex === -1) {
                    focusableElements[0].focus();
                    return;
                }

                let nextIndex;
                if (e.key === "ArrowDown") {
                    nextIndex = (currentIndex + 1) % focusableElements.length;
                } else {
                    nextIndex =
                        (currentIndex - 1 + focusableElements.length) %
                        focusableElements.length;
                }

                focusableElements[nextIndex].focus();
            });
        </script>

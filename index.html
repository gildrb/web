<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta
            name="description"
            content="Studying AI/Data Science. Designer."
        />
        <title>Gil Rodrigues</title>
        <link
            rel="preload"
            href="fonts/OpeningHoursSans-Regular.woff2"
            as="font"
            type="font/woff2"
            crossorigin
        />
        <script>
            // Apply theme before CSS is parsed to prevent flash
            const savedTheme = localStorage.getItem("theme") || "dark";
            if (savedTheme === "light") {
                document.documentElement.classList.add("light-mode");
            }
        </script>
        <style>
            @font-face {
                font-family: "Opening Hours Sans";
                src: url("fonts/OpeningHoursSans-Regular.woff2") format("woff2");
                font-weight: 400;
                font-style: normal;
                font-display: swap;
            }
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }

            html {
                scrollbar-width: none;
                -ms-overflow-style: none;
            }

            html::-webkit-scrollbar {
                display: none;
            }

            body {
                background: #000000;
                color: #ffffff;
                font-family:
                    "Opening Hours Sans",
                    -apple-system,
                    BlinkMacSystemFont,
                    "Segoe UI",
                    "Arial",
                    sans-serif;
                font-size: 20px;
                line-height: 1.5;
                height: 100vh;
                padding: 64px;
                position: relative;
                -webkit-font-smoothing: antialiased;
                -moz-osx-font-smoothing: grayscale;
                text-rendering: optimizeLegibility;
                -webkit-overflow-scrolling: touch;
                display: flex;
                flex-direction: column;
                justify-content: space-between;
            }

            .name {
                font-size: 20px;
                font-weight: 400;
                color: #ffffff;
                letter-spacing: 0.02em;
                margin-bottom: 8px;
            }

            .subtitle {
                font-size: 20px;
                font-weight: 400;
                color: #808080;
                margin-bottom: 32px;
            }

            .email {
                font-size: 20px;
                color: #808080;
                cursor: pointer;
                margin-bottom: 8px;
                width: fit-content;
                background: none;
                border: none;
                padding: 0;
                font-family: inherit;
                text-align: left;
            }

            .email::after {
                content: "";
                color: #808080;
                opacity: 1;
            }

            .email:hover {
                color: #ffffff;
            }

            .email:hover::after {
                content: " copy";
                color: #808080;
            }

            .email.copied::after {
                content: " copied";
                color: #808080;
            }

            .links {
                font-size: 20px;
                display: flex;
                flex-direction: column;
            }

            .links a {
                color: #808080;
                text-decoration: none;
                margin-bottom: 8px;
                width: fit-content;
            }

            .links a::after {
                content: " ↗";
                color: #808080;
            }

            .links a:hover {
                color: #ffffff;
            }

            .links a:hover::after {
                color: #808080;
            }

            .theme-toggle {
                color: #808080;
                text-decoration: none;
                cursor: pointer;
                display: inline-block;
                position: absolute;
                bottom: 64px;
                left: 64px;
                font-size: 20px;
                background: none;
                border: none;
                padding: 0;
                font-family: inherit;
            }

            .theme-toggle:hover {
                color: #ffffff;
            }

            /* Light mode styles */
            .light-mode body {
                background: #ffffff;
                color: #000000;
            }

            .light-mode .name {
                color: #000000;
            }

            .light-mode .subtitle {
                color: #808080;
            }

            .light-mode .email {
                color: #808080;
            }

            .light-mode .email::after {
                color: #808080;
            }

            .light-mode .email:hover {
                color: #000000;
            }

            .light-mode .email:hover::after {
                color: #808080;
            }

            .light-mode .email.copied::after {
                color: #808080;
            }

            .light-mode .links a {
                color: #808080;
            }

            .light-mode .links a::after {
                color: #808080;
            }

            .light-mode .links a:hover {
                color: #000000;
            }

            .light-mode .links a:hover::after {
                color: #808080;
            }

            .light-mode .theme-toggle {
                color: #808080;
            }

            .light-mode .theme-toggle:hover {
                color: #000000;
            }

            .sr-only {
                position: absolute;
                width: 1px;
                height: 1px;
                padding: 0;
                margin: -1px;
                overflow: hidden;
                clip: rect(0, 0, 0, 0);
                white-space: nowrap;
                border-width: 0;
            }

            @media (max-width: 768px) {
                body {
                    padding: 32px;
                }

                .theme-toggle {
                    bottom: 32px;
                    left: 32px;
                }
            }
        </style>
    </head>
    <body>
        <div
            class="sr-only"
            role="status"
            aria-live="polite"
            aria-atomic="true"
        ></div>
        <main id="main">
            <p class="name">gil domingos rodrigues barbosa</p>
            <p class="subtitle">student</p>
            <button class="email" aria-label="Copy email address">
                hello@gildrb.com
            </button>
            <div class="links">
                <a href="https://github.com/gildrb">github</a>
                <a href="https://www.linkedin.com/in/gildrb/">linkedin</a>
                <a href="http://behance.net/gildrb">behance</a>
                <a href="https://bsky.app/profile/gildrb.com">bluesky</a>
            </div>
        </main>
        <button class="theme-toggle" aria-label="Switch to light mode">
            light mode
        </button>
        <script>
            const srOnly = document.querySelector(".sr-only");

            function announce(message) {
                srOnly.textContent = message;
                setTimeout(() => {
                    srOnly.textContent = "";
                }, 1000);
            }

            document
                .querySelector(".email")
                .addEventListener("click", function () {
                    navigator.clipboard.writeText("hello@gildrb.com");
                    this.classList.add("copied");
                    announce("Email copied to clipboard");
                    setTimeout(() => this.classList.remove("copied"), 1500);
                });

            const themeToggle = document.querySelector(".theme-toggle");
            const html = document.documentElement;

            // Set initial button text based on current theme
            if (html.classList.contains("light-mode")) {
                themeToggle.textContent = "dark mode";
                themeToggle.setAttribute("aria-label", "Switch to dark mode");
            }

            themeToggle.addEventListener("click", function () {
                html.classList.toggle("light-mode");

                if (html.classList.contains("light-mode")) {
                    themeToggle.textContent = "dark mode";
                    themeToggle.setAttribute(
                        "aria-label",
                        "Switch to dark mode",
                    );
                    localStorage.setItem("theme", "light");
                    announce("Switched to light mode");
                } else {
                    themeToggle.textContent = "light mode";
                    themeToggle.setAttribute(
                        "aria-label",
                        "Switch to light mode",
                    );
                    localStorage.setItem("theme", "dark");
                    announce("Switched to dark mode");
                }
            });
        </script>
    </body>
</html>

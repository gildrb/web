<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gil Domingos Rodrigues Barbosa</title>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000000;
            color: #ffffff;
            font-family: 'IBM Plex Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Arial', sans-serif;
            font-size: 16px;
            line-height: 1.5;
            min-height: 100vh;
            padding: 64px;
            position: relative;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            text-rendering: optimizeLegibility;
        }

        .name {
            font-size: 16px;
            font-weight: 400;
            color: #ffffff;
            letter-spacing: 0.02em;
            margin-bottom: 8px;
        }

        .subtitle {
            font-size: 14px;
            font-weight: 400;
            color: #666666;
            margin-bottom: 16px;
        }

        .email {
            font-size: 16px;
            color: #999999;
            cursor: pointer;
            margin-bottom: 8px;
        }

        .email::after {
            content: '';
            color: #666666;
            opacity: 1;
        }

        .email:hover {
            color: #ffffff;
        }

        .email:hover::after {
            content: ' copy';
            color: #666666;
        }

        .email.copied::after {
            content: ' copied';
            color: #666666;
        }

        .links {
            font-size: 16px;
            display: flex;
            flex-direction: column;
        }

        .links a {
            color: #999999;
            text-decoration: none;
            margin-bottom: 8px;
        }

        .links a::after {
            content: ' ↗';
            color: #666666;
        }

        .links a:hover {
            color: #ffffff;
        }

        .links a:hover::after {
            color: #666666;
        }

        .theme-toggle {
            color: #999999;
            text-decoration: none;
            cursor: pointer;
            display: inline-block;
            position: fixed;
            bottom: 64px;
            left: 64px;
            font-size: 16px;
        }

        .theme-toggle::after {
            content: ' ◐';
            color: #666666;
        }

        .theme-toggle:hover {
            color: #ffffff;
        }

        .theme-toggle:hover::after {
            color: #666666;
        }

        /* Light mode styles */
        body.light-mode {
            background: #fbf1c7;
            color: #3c3836;
        }

        body.light-mode .name {
            color: #3c3836;
        }

        body.light-mode .subtitle {
            color: #504945;
        }

        body.light-mode .email {
            color: #665c54;
        }

        body.light-mode .email::after {
            color: #928374;
        }

        body.light-mode .links a {
            color: #665c54;
        }

        body.light-mode .links a::after {
            color: #928374;
        }

        body.light-mode .links a:hover {
            color: #d79921;
        }

        body.light-mode .links a:hover::after {
            color: #d79921;
        }

        body.light-mode .theme-toggle {
            color: #665c54;
        }

        body.light-mode .theme-toggle::after {
            color: #928374;
        }

        body.light-mode .theme-toggle:hover {
            color: #d79921;
        }

        body.light-mode .theme-toggle:hover::after {
            color: #d79921;
        }

        @media (max-width: 768px) {
            body {
                padding: 32px;
            }

            .theme-toggle {
                bottom: 32px;
                left: 32px;
            }
        }
    </style>
</head>
<body>
    <p class="name">gil domingos rodrigues barbosa</p>
    <p class="subtitle">student</p>
    <p class="email">hello@gildrb.com</p>
    <div class="links">
        <a href="https://github.com/gildrb">github</a>
        <a href="https://de.linkedin.com/in/gil-rodrigues-792786367">linkedin</a>
        <a href="http://behance.net/gildrb">behance</a>
    </div>
    <span class="theme-toggle">light</span>
    <script>
        document.querySelector('.email').addEventListener('click', function() {
            navigator.clipboard.writeText('hello@gildrb.com');
            this.classList.add('copied');
            setTimeout(() => this.classList.remove('copied'), 1500);
        });

        const themeToggle = document.querySelector('.theme-toggle');
        const body = document.body;

        // Check for saved theme preference or default to dark mode
        const currentTheme = localStorage.getItem('theme') || 'dark';
        if (currentTheme === 'light') {
            body.classList.add('light-mode');
            themeToggle.textContent = 'dark';
        }

        themeToggle.addEventListener('click', function() {
            body.classList.toggle('light-mode');

            if (body.classList.contains('light-mode')) {
                themeToggle.textContent = 'dark';
                localStorage.setItem('theme', 'light');
            } else {
                themeToggle.textContent = 'light';
                localStorage.setItem('theme', 'dark');
            }
        });
    </script>
</body>
</html>

        <style>
            :root {
                --bg: #000000;
                --text-primary: #ffffff;
                --text-secondary: #808080;
            }

            @media (prefers-color-scheme: light) {
                :root {
                    --bg: #ffffff;
                    --text-primary: #000000;
                    --text-secondary: #4d4d4d;
                }
            }

            :root[data-theme="dark"] {
                --bg: #000000;
                --text-primary: #ffffff;
                --text-secondary: #808080;
            }

            :root[data-theme="light"] {
                --bg: #ffffff;
                --text-primary: #000000;
                --text-secondary: #4d4d4d;
            }

            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }

            ::selection {
                color: var(--text-primary);
                background: var(--text-secondary);
            }

            .name {
                font-size: 19px;
                font-weight: 400;
                letter-spacing: -0.02em;
                color: var(--text-primary);
                margin-bottom: 8px;
                white-space: nowrap;
                -webkit-font-smoothing: antialiased;
                text-rendering: optimizeLegibility;
            }

            .subtitle {
                font-size: 16px;
                font-weight: 400;
                color: var(--text-secondary);
                margin-bottom: 32px;
                -webkit-font-smoothing: antialiased;
                -webkit-text-size-adjust: 100%;
                text-rendering: optimizeLegibility;
            }

            .links {
                font-size: 16px;
                font-weight: 400;
                display: flex;
                flex-direction: column;
                -webkit-font-smoothing: antialiased;
                -webkit-text-size-adjust: 100%;
                text-rendering: optimizeLegibility;
            }

            .links-label {
                color: var(--text-primary);
                margin-bottom: 8px;
                width: fit-content;
            }

            .work-label {
                font-size: 16px;
                font-weight: 400;
                color: var(--text-primary);
                margin-bottom: 8px;
                width: fit-content;
                -webkit-font-smoothing: antialiased;
                -webkit-text-size-adjust: 100%;
                text-rendering: optimizeLegibility;
            }

            .email {
                font-size: 16px;
                font-weight: 400;
                color: var(--text-secondary);
                cursor: pointer;
                margin-top: 24px;
                margin-bottom: 8px;
                width: fit-content;
                background: none;
                border: none;
                padding: 0;
                font-family: inherit;
                text-align: left;
                -webkit-font-smoothing: antialiased;
                -webkit-text-size-adjust: 100%;
                text-rendering: optimizeLegibility;
            }

            body {
                background: var(--bg);
                color: var(--text-primary);
                font-family:
                    Inter,
                    -apple-system,
                    BlinkMacSystemFont,
                    "Segoe UI",
                    sans-serif;
                font-feature-settings:
                    "liga" 1,
                    "calt" 1;
                font-weight: 400;
                font-size: 1px;
                line-height: 1.5;
                min-height: 100vh;
                -webkit-font-smoothing: antialiased;
                -webkit-text-size-adjust: 100%;
                -moz-osx-font-smoothing: grayscale;
                text-rendering: optimizeLegibility;
                -webkit-overflow-scrolling: touch;
            }

            body.preview-open {
                overflow: hidden;
            }

            .wrapper {
                max-width: 1900px;
                margin: 0 auto;
                padding: 0 48px;
            }

            .layout {
                display: grid;
                grid-template-columns: 280px 1fr;
                min-height: 100vh;
                gap: 48px;
            }

            .sidebar {
                position: sticky;
                top: 0;
                height: 100vh;
                padding: 64px 0;
                display: flex;
                flex-direction: column;
                justify-content: flex-start;
                z-index: 100;
            }

            .external-link {
                color: var(--text-secondary);
                text-decoration: none;
                margin-bottom: 8px;
                width: fit-content;
            }

            .external-link::after {
                content: " ↗";
                color: var(--text-secondary);
            }

            @media (hover: hover) {
                .external-link:hover {
                    color: var(--text-primary);
                }
            }

            @media (hover: hover) {
                .external-link:hover::after {
                    color: var(--text-secondary);
                }
            }

            .email::after {
                content: "";
                color: var(--text-secondary);
                opacity: 1;
            }

            @media (hover: hover) {
                .email:hover {
                    color: var(--text-primary);
                }
            }

            @media (hover: hover) {
                .email:hover::after {
                    content: " copy";
                    color: var(--text-secondary);
                }
            }

            .email.copied::after {
                content: " copied";
                color: var(--text-secondary);
            }

            .email.copy-failed::after {
                content: " failed";
                color: var(--text-secondary);
            }

            .external-link:focus:not(:focus-visible),
            .email:focus:not(:focus-visible) {
                outline: none;
            }

            .external-link:focus-visible,
            .email:focus-visible {
                color: var(--text-primary);
                outline: 1px solid var(--text-primary);
                outline-offset: 4px;
            }

            .theme-toggle {
                width: 32px;
                height: 32px;
                margin-top: auto;
                display: inline-flex;
                align-items: center;
                justify-content: center;
                color: var(--text-secondary);
                background: none;
                border: none;
                border-radius: 50%;
                padding: 0;
                appearance: none;
                cursor: pointer;
            }

            .theme-toggle svg {
                width: var(--theme-icon-size);
                height: var(--theme-icon-size);
                display: block;
                fill: currentColor;
            }

            .theme-toggle .sun-icon {
                --theme-icon-size: 22px;
            }

            .theme-toggle .moon-icon {
                --theme-icon-size: 14px;
                display: none;
            }

            @media (prefers-color-scheme: light) {
                :root:not([data-theme]) .theme-toggle {
                    color: color-mix(
                        in srgb,
                        var(--text-secondary) 83%,
                        var(--bg)
                    );
                }

                .theme-toggle .sun-icon {
                    display: none;
                }

                .theme-toggle .moon-icon {
                    display: block;
                }
            }

            :root[data-theme="dark"] .theme-toggle .sun-icon {
                display: block;
            }

            :root[data-theme="dark"] .theme-toggle .moon-icon {
                display: none;
            }

            :root[data-theme="light"] .theme-toggle .sun-icon {
                display: none;
            }

            :root[data-theme="light"] .theme-toggle {
                color: color-mix(in srgb, var(--text-secondary) 83%, var(--bg));
            }

            :root[data-theme="light"] .theme-toggle .moon-icon {
                display: block;
            }

            @media (hover: hover) {
                .theme-toggle:hover:not(.hover-suppressed) {
                    color: var(--text-primary);
                }
            }

            .theme-toggle:focus-visible {
                outline: none;
                box-shadow: 0 0 0 1px var(--text-primary);
            }

            .content {
                padding: 64px 0;
            }

            .showcase {
                display: grid;
                grid-template-columns: 2.5fr 1fr;
                gap: 20px;
                margin-bottom: 120px;
                align-items: start;
            }

            .showcase-featured {
                position: sticky;
                top: 64px;
            }

            .showcase-featured .image-wrapper {
                position: relative;
                overflow: hidden;
                border-radius: 0px;
                cursor: zoom-in;
                width: 100%;
                display: block;
                padding: 0;
                border: 0;
                background: none;
                appearance: none;
                color: inherit;
                font: inherit;
                text-align: inherit;
            }

            .showcase-featured img {
                width: 100%;
                height: auto;
                display: block;
                user-select: none;
                -webkit-user-drag: none;
            }

            .showcase-featured .image-wrapper::after {
                content: "";
                position: absolute;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                pointer-events: none;
            }

            .showcase-scroll {
                display: flex;
                flex-direction: column;
                gap: 20px;
            }

            .showcase.reverse {
                grid-template-columns: 1fr 2.5fr;
            }

            .showcase.reverse .showcase-featured {
                grid-column: 2;
                grid-row: 1;
            }

            .showcase.reverse .showcase-scroll {
                grid-column: 1;
                grid-row: 1;
            }

            .showcase-scroll .image-wrapper {
                position: relative;
                overflow: hidden;
                border-radius: 0px;
                cursor: zoom-in;
                width: 100%;
                display: block;
                padding: 0;
                border: 0;
                background: none;
                appearance: none;
                color: inherit;
                font: inherit;
                text-align: inherit;
            }

            .showcase-scroll img {
                width: 100%;
                height: auto;
                display: block;
                user-select: none;
                -webkit-user-drag: none;
            }

            .showcase-scroll .image-wrapper::after {
                content: "";
                position: absolute;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                pointer-events: none;
            }

            .gallery {
                display: grid;
                grid-template-columns: repeat(2, 1fr);
                gap: 20px;
                margin-bottom: 120px;
            }

            .gallery-item {
                position: relative;
                border-radius: 0px;
                overflow: hidden;
                cursor: zoom-in;
                width: 100%;
                display: block;
                padding: 0;
                border: 0;
                background: none;
                appearance: none;
                color: inherit;
                font: inherit;
                text-align: inherit;
            }

            .gallery-item::after {
                content: "";
                position: absolute;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                pointer-events: none;
            }

            .gallery-item.full {
                grid-column: span 2;
            }

            .gallery-item img {
                width: 100%;
                height: auto;
                display: block;
                user-select: none;
                -webkit-user-drag: none;
            }

            .image-wrapper:focus-visible,
            .gallery-item:focus-visible {
                outline: 1px solid var(--text-primary);
                outline-offset: 4px;
            }

            .image-preview {
                --preview-inline-space: 96px;
                --preview-block-space: 128px;
                position: fixed;
                inset: 0;
                z-index: 1000;
                width: 100%;
                min-height: 100vh;
                display: block;
                padding: 64px 48px;
                border: 0;
                background: var(--bg);
                cursor: zoom-out;
                appearance: none;
                color: inherit;
                font: inherit;
                text-align: inherit;
            }

            .image-preview[hidden] {
                display: none;
            }

            .image-preview-frame {
                display: flex;
                align-items: center;
                justify-content: center;
                width: min(
                    calc(100vw - var(--preview-inline-space)),
                    calc(1900px - var(--preview-inline-space))
                );
                height: calc(100vh - var(--preview-block-space));
                margin: 0 auto;
            }

            .image-preview img {
                width: auto;
                height: auto;
                max-width: 100%;
                max-height: 100%;
                display: block;
                user-select: none;
                -webkit-user-drag: none;
            }

            .section-title {
                font-size: 16px;
                font-weight: 400;
                color: var(--text-secondary);
                margin-bottom: 24px;
                -webkit-font-smoothing: antialiased;
                -webkit-text-size-adjust: 100%;
                text-rendering: optimizeLegibility;
            }

            .sr-only {
                position: absolute;
                width: 1px;
                height: 1px;
                padding: 0;
                margin: -1px;
                overflow: hidden;
                clip: rect(0, 0, 0, 0);
                white-space: nowrap;
                border-width: 0;
            }

            @media (max-width: 1400px) {
                .wrapper {
                    padding: 0 32px;
                }

                .image-preview {
                    --preview-inline-space: 64px;
                    padding-right: 32px;
                    padding-left: 32px;
                }

                .layout {
                    gap: 32px;
                }

                .showcase {
                    grid-template-columns: 2fr 1fr;
                }

                .showcase.reverse {
                    grid-template-columns: 1fr 2fr;
                }
            }

            @media (max-width: 1100px) {
                .layout {
                    grid-template-columns: 240px 1fr;
                }

                .showcase {
                    grid-template-columns: 1.8fr 1fr;
                }

                .showcase.reverse {
                    grid-template-columns: 1fr 1.8fr;
                }
            }

            @media (max-width: 900px) {
                .showcase {
                    grid-template-columns: 1fr;
                }

                .showcase.reverse {
                    grid-template-columns: 1fr;
                }

                .showcase.reverse .showcase-featured,
                .showcase.reverse .showcase-scroll {
                    grid-column: auto;
                    grid-row: auto;
                }

                .showcase-featured {
                    position: relative;
                    top: 0;
                }
            }

            @media (max-width: 768px) {
                .wrapper {
                    padding: 0 24px;
                }

                .image-preview {
                    --preview-inline-space: 48px;
                    --preview-block-space: 64px;
                    padding: 32px 24px;
                }

                .layout {
                    grid-template-columns: 1fr;
                    gap: 0;
                }

                .sidebar {
                    position: relative;
                    height: auto;
                    padding: 32px 0;
                    padding-bottom: 48px;
                    display: grid;
                    grid-template-columns: minmax(0, 1fr) 32px;
                    column-gap: 16px;
                    align-items: start;
                }

                .name,
                .subtitle,
                .links,
                .email {
                    grid-column: 1;
                }

                .theme-toggle {
                    grid-column: 2;
                    grid-row: 1;
                    justify-self: end;
                    align-self: start;
                    margin-top: 0;
                }

                .name {
                    white-space: normal;
                }

                .content {
                    padding: 0 0 32px 0;
                }

                .showcase {
                    margin-bottom: 80px;
                }

                .gallery {
                    grid-template-columns: 1fr;
                    margin-bottom: 80px;
                }

                .gallery-item.full {
                    grid-column: span 1;
                }
            }
        </style>
    </head>

        <script>
            const srOnly = document.querySelector(".sr-only");
            const themeToggle = document.querySelector(".theme-toggle");
            const themePreference = window.matchMedia(
                "(prefers-color-scheme: dark)",
            );
            const trackedScrollMilestones = new Set();
            const scrollMilestones = [25, 50, 75, 100];

            function trackEvent(name, data = {}) {
                if (typeof window.va !== "function") return;

                try {
                    window.va("event", {
                        name,
                        data,
                    });
                } catch {
                    return;
                }
            }

            function announce(message) {
                srOnly.textContent = message;
                setTimeout(() => {
                    srOnly.textContent = "";
                }, 1000);
            }

            function getTheme() {
                const selectedTheme = document.documentElement.dataset.theme;

                if (selectedTheme === "dark" || selectedTheme === "light") {
                    return selectedTheme;
                }

                return themePreference.matches ? "dark" : "light";
            }

            function updateThemeToggle() {
                const theme = getTheme();
                const nextTheme = theme === "dark" ? "light" : "dark";
                const label = `Switch to ${nextTheme} mode`;

                themeToggle.setAttribute("aria-label", label);
                themeToggle.title = label;
            }

            function getSavedTheme() {
                try {
                    return localStorage.getItem("theme");
                } catch {
                    return null;
                }
            }

            function saveTheme(theme) {
                try {
                    localStorage.setItem("theme", theme);
                } catch {
                    return;
                }
            }

            function setTheme(theme) {
                document.documentElement.dataset.theme = theme;
                saveTheme(theme);
                updateThemeToggle();
            }

            const savedTheme = getSavedTheme();
            if (savedTheme === "dark" || savedTheme === "light") {
                document.documentElement.dataset.theme = savedTheme;
            }

            updateThemeToggle();

            let themeToggleUsedPointer = false;

            themeToggle.addEventListener("pointerdown", (event) => {
                themeToggleUsedPointer =
                    event.pointerType === "mouse" ||
                    event.pointerType === "pen";
            });

            themeToggle.addEventListener("pointerleave", () => {
                themeToggle.classList.remove("hover-suppressed");
            });

            themePreference.addEventListener("change", () => {
                if (!document.documentElement.dataset.theme) {
                    updateThemeToggle();
                }
            });

            themeToggle.addEventListener("click", () => {
                const nextTheme = getTheme() === "dark" ? "light" : "dark";
                setTheme(nextTheme);
                trackEvent("Theme Toggle", { theme: nextTheme });

                if (themeToggleUsedPointer) {
                    themeToggle.classList.add("hover-suppressed");
                    themeToggle.blur();
                }

                themeToggleUsedPointer = false;
                announce(`Switched to ${nextTheme} mode`);
            });

            // Email copy functionality
            document
                .querySelector(".email")
                .addEventListener("click", async function () {
                    this.blur();

                    try {
                        await navigator.clipboard.writeText("hi@gildrb.com");
                        this.classList.add("copied");
                        trackEvent("Email Copy", { result: "success" });
                        announce("Email copied to clipboard");
                    } catch {
                        this.classList.add("copy-failed");
                        trackEvent("Email Copy", { result: "failed" });
                        announce("Email could not be copied");
                    }

                    setTimeout(() => {
                        this.classList.remove("copied", "copy-failed");
                    }, 1500);
                });

            const imagePreview = document.querySelector(".image-preview");
            const previewImage = imagePreview.querySelector("img");
            const previewImageCache = new Map();
            const previewResourcePrefetches = new Set();
            let previouslyFocusedElement = null;
            let shouldRestorePreviewFocus = false;
            let activePreviewSrc = "";

            function getPreviewSrc(image) {
                return (
                    image.dataset.previewSrc || image.currentSrc || image.src
                );
            }

            function getImageProject(image) {
                const section = image.closest("section");
                const title = section?.previousElementSibling;

                if (title?.classList.contains("section-title")) {
                    return title.textContent.trim();
                }

                return "Portfolio";
            }

            function getImageItem(image) {
                const label = image.closest("button")?.ariaLabel;

                return label
                    ? label.replace(/^Open /, "").replace(/ preview$/, "")
                    : "Image";
            }

            function prefetchPreviewImage(image) {
                const previewSrc = getPreviewSrc(image);
                if (!previewSrc) return null;

                if (previewImageCache.has(previewSrc)) {
                    return previewImageCache.get(previewSrc);
                }

                const preloadImage = new Image();
                preloadImage.decoding = "async";
                preloadImage.src = previewSrc;
                previewImageCache.set(previewSrc, preloadImage);

                return preloadImage;
            }

            function prefetchPreviewResource(image) {
                const previewSrc = getPreviewSrc(image);
                if (
                    !previewSrc ||
                    previewImageCache.has(previewSrc) ||
                    previewResourcePrefetches.has(previewSrc)
                ) {
                    return;
                }

                const prefetchLink = document.createElement("link");
                prefetchLink.rel = "prefetch";
                prefetchLink.as = "image";
                prefetchLink.href = previewSrc;
                document.head.append(prefetchLink);
                previewResourcePrefetches.add(previewSrc);
            }

            function warmPreviewImages() {
                document
                    .querySelectorAll("main img[data-preview-src]")
                    .forEach(prefetchPreviewResource);
            }

            function showPreviewImage(previewSrc) {
                if (!imagePreview.hidden && activePreviewSrc === previewSrc) {
                    previewImage.src = previewSrc;
                }
            }

            function showPreviewImageWhenReady(preloadedImage, previewSrc) {
                if (!preloadedImage || !previewSrc) return;

                const decodePreview = () => {
                    if (preloadedImage.decode) {
                        preloadedImage
                            .decode()
                            .then(() => showPreviewImage(previewSrc))
                            .catch(() => showPreviewImage(previewSrc));
                        return;
                    }

                    showPreviewImage(previewSrc);
                };

                if (
                    preloadedImage.complete &&
                    preloadedImage.naturalWidth > 0
                ) {
                    decodePreview();
                    return;
                }

                preloadedImage.addEventListener("load", decodePreview, {
                    once: true,
                });
            }

            function schedulePreviewWarmup() {
                if ("requestIdleCallback" in window) {
                    requestIdleCallback(warmPreviewImages, {
                        timeout: 2000,
                    });
                    return;
                }

                setTimeout(warmPreviewImages, 800);
            }

            window.addEventListener("load", schedulePreviewWarmup, {
                once: true,
            });

            function openImagePreview(image, options = {}) {
                const previewSrc = getPreviewSrc(image);
                const fallbackSrc = image.currentSrc || image.src;
                const preloadedImage = prefetchPreviewImage(image);

                previouslyFocusedElement = document.activeElement;
                shouldRestorePreviewFocus = options.restoreFocus;
                activePreviewSrc = previewSrc;
                previewImage.src = fallbackSrc;
                previewImage.alt = image.alt;
                imagePreview.hidden = false;
                document.body.classList.add("preview-open");
                imagePreview.focus({ preventScroll: true });

                if (previewSrc && previewSrc !== fallbackSrc) {
                    showPreviewImageWhenReady(preloadedImage, previewSrc);
                }

                trackEvent("Image Preview Open", {
                    project: getImageProject(image),
                    item: getImageItem(image),
                });
                announce("Image enlarged");
            }

            function closeImagePreview() {
                if (imagePreview.hidden) return;

                imagePreview.hidden = true;
                activePreviewSrc = "";
                previewImage.src = "data:,";
                document.body.classList.remove("preview-open");

                if (shouldRestorePreviewFocus && previouslyFocusedElement) {
                    previouslyFocusedElement.focus({ preventScroll: true });
                }

                previouslyFocusedElement = null;
                shouldRestorePreviewFocus = false;
                announce("Image closed");
            }

            document
                .querySelectorAll(".image-wrapper, .gallery-item")
                .forEach((imageTrigger) => {
                    const image = imageTrigger.querySelector("img");
                    if (!image) return;

                    imageTrigger.addEventListener(
                        "pointerenter",
                        () => prefetchPreviewImage(image),
                        { once: true },
                    );

                    imageTrigger.addEventListener(
                        "focus",
                        () => prefetchPreviewImage(image),
                        { once: true },
                    );

                    imageTrigger.addEventListener(
                        "pointerdown",
                        () => prefetchPreviewImage(image),
                        {
                            once: true,
                            passive: true,
                        },
                    );

                    imageTrigger.addEventListener(
                        "touchstart",
                        () => prefetchPreviewImage(image),
                        {
                            once: true,
                            passive: true,
                        },
                    );

                    imageTrigger.addEventListener("click", (event) => {
                        openImagePreview(image, {
                            restoreFocus: event.detail === 0,
                        });
                    });
                });

            imagePreview.addEventListener("click", closeImagePreview);

            document.querySelectorAll(".external-link").forEach((link) => {
                link.addEventListener("click", () => {
                    trackEvent("Profile Link Click", {
                        destination: link.textContent.trim(),
                    });
                });
            });

            function trackScrollMilestones() {
                const scrollableHeight =
                    document.documentElement.scrollHeight - window.innerHeight;
                const scrollPercent =
                    scrollableHeight <= 0
                        ? 100
                        : Math.round((window.scrollY / scrollableHeight) * 100);

                scrollMilestones.forEach((milestone) => {
                    if (
                        scrollPercent < milestone ||
                        trackedScrollMilestones.has(milestone)
                    ) {
                        return;
                    }

                    trackedScrollMilestones.add(milestone);
                    trackEvent("Scroll Milestone", {
                        depth: `${milestone}%`,
                    });
                });
            }

            window.addEventListener("scroll", trackScrollMilestones, {
                passive: true,
            });
            trackScrollMilestones();

            // Disable right-click on all images
            document.querySelectorAll("img").forEach((img) => {
                img.addEventListener("contextmenu", (e) => e.preventDefault());
            });

            // Arrow key navigation
            const focusableElements = [
                ...document.querySelectorAll(".links a"),
                document.querySelector(".email"),
                themeToggle,
            ];

            document.addEventListener("keydown", function (e) {
                if (e.key === "Escape" && !imagePreview.hidden) {
                    e.preventDefault();
                    closeImagePreview();
                    return;
                }

                if (!imagePreview.hidden) return;

                if (e.key !== "ArrowUp" && e.key !== "ArrowDown") return;

                e.preventDefault();

                const activeElement = document.activeElement;
                const currentIndex = focusableElements.indexOf(activeElement);

                if (currentIndex === -1) {
                    focusableElements[0].focus();
                    return;
                }

                let nextIndex;
                if (e.key === "ArrowDown") {
                    nextIndex = (currentIndex + 1) % focusableElements.length;
                } else {
                    nextIndex =
                        (currentIndex - 1 + focusableElements.length) %
                        focusableElements.length;
                }

                focusableElements[nextIndex].focus();
            });
        </script>
    </body>
</html>

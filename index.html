        <style>
            :root {
                --bg: #000000;
                --text-primary: #ffffff;
                --text-secondary: #808080;
            }

            @media (prefers-color-scheme: light) {
                :root {
                    --bg: #ffffff;
                    --text-primary: #000000;
                    --text-secondary: #4d4d4d;
                }
            }

            :root[data-theme="dark"] {
                --bg: #000000;
                --text-primary: #ffffff;
                --text-secondary: #808080;
            }

            :root[data-theme="light"] {
                --bg: #ffffff;
                --text-primary: #000000;
                --text-secondary: #4d4d4d;
            }

            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }

            ::selection {
                color: var(--text-primary);
                background: var(--text-secondary);
            }

            .name {
                font-size: 18px;
                font-weight: 400;
                letter-spacing: -0.02em;
                color: var(--text-primary);
                margin-bottom: 8px;
                white-space: nowrap;
                -webkit-font-smoothing: antialiased;
                text-rendering: optimizeLegibility;
            }

            .subtitle {
                font-size: 16px;
                font-weight: 400;
                color: var(--text-secondary);
                margin-bottom: 32px;
                -webkit-font-smoothing: antialiased;
                -webkit-text-size-adjust: 100%;
                text-rendering: optimizeLegibility;
            }

            .links {
                font-size: 16px;
                font-weight: 400;
                display: flex;
                flex-direction: column;
                -webkit-font-smoothing: antialiased;
                -webkit-text-size-adjust: 100%;
                text-rendering: optimizeLegibility;
            }

            .email {
                font-size: 16px;
                font-weight: 400;
                color: var(--text-secondary);
                cursor: pointer;
                margin-top: 24px;
                margin-bottom: 8px;
                width: fit-content;
                background: none;
                border: none;
                padding: 0;
                font-family: inherit;
                text-align: left;
                -webkit-font-smoothing: antialiased;
                -webkit-text-size-adjust: 100%;
                text-rendering: optimizeLegibility;
            }

            body {
                background: var(--bg);
                color: var(--text-primary);
                font-family: "Inter", sans-serif;
                font-feature-settings:
                    "liga" 1,
                    "calt" 1;
                font-weight: 400;
                font-size: 1px;
                line-height: 1.5;
                min-height: 100vh;
                -webkit-font-smoothing: antialiased;
                -webkit-text-size-adjust: 100%;
                -moz-osx-font-smoothing: grayscale;
                text-rendering: optimizeLegibility;
                -webkit-overflow-scrolling: touch;
            }

            body.preview-open {
                overflow: hidden;
            }

            @supports (font-variation-settings: normal) {
                :root {
                    font-family: InterVariable, sans-serif;
                }
            }

            .wrapper {
                max-width: 1900px;
                margin: 0 auto;
                padding: 0 48px;
            }

            .layout {
                display: grid;
                grid-template-columns: 280px 1fr;
                min-height: 100vh;
                gap: 48px;
            }

            .sidebar {
                position: sticky;
                top: 0;
                height: 100vh;
                padding: 64px 0;
                display: flex;
                flex-direction: column;
                justify-content: flex-start;
                z-index: 100;
            }

            .links a {
                color: var(--text-secondary);
                text-decoration: none;
                margin-bottom: 8px;
                width: fit-content;
            }

            .links a::after {
                content: " ↗";
                color: var(--text-secondary);
            }

            @media (hover: hover) {
                .links a:hover,
                .links a:focus {
                    color: var(--text-primary);
                    outline: none;
                }
            }

            @media (hover: hover) {
                .links a:hover::after,
                .links a:focus::after {
                    color: var(--text-secondary);
                }
            }

            .email::after {
                content: "";
                color: var(--text-secondary);
                opacity: 1;
            }

            @media (hover: hover) {
                .email:hover,
                .email:focus {
                    color: var(--text-primary);
                    outline: none;
                }
            }

            @media (hover: hover) {
                .email:hover::after,
                .email:focus::after {
                    content: " copy";
                    color: var(--text-secondary);
                }
            }

            .email.copied::after {
                content: " copied";
                color: var(--text-secondary);
            }

            .theme-toggle {
                width: 32px;
                height: 32px;
                margin-top: auto;
                display: inline-flex;
                align-items: center;
                justify-content: center;
                color: var(--text-secondary);
                background: none;
                border: none;
                border-radius: 50%;
                padding: 0;
                appearance: none;
                cursor: pointer;
            }

            .theme-toggle svg {
                width: 18px;
                height: 18px;
                display: block;
                stroke: currentColor;
            }

            .theme-toggle .moon-icon {
                display: none;
            }

            @media (prefers-color-scheme: light) {
                .theme-toggle .sun-icon {
                    display: none;
                }

                .theme-toggle .moon-icon {
                    display: block;
                }
            }

            :root[data-theme="dark"] .theme-toggle .sun-icon {
                display: block;
            }

            :root[data-theme="dark"] .theme-toggle .moon-icon {
                display: none;
            }

            :root[data-theme="light"] .theme-toggle .sun-icon {
                display: none;
            }

            :root[data-theme="light"] .theme-toggle .moon-icon {
                display: block;
            }

            @media (hover: hover) {
                .theme-toggle:hover {
                    color: var(--text-primary);
                }
            }

            .theme-toggle:focus-visible {
                outline: 1px solid var(--text-primary);
                outline-offset: 4px;
            }

            .content {
                padding: 64px 0;
            }

            .showcase {
                display: grid;
                grid-template-columns: 2.5fr 1fr;
                gap: 20px;
                margin-bottom: 120px;
                align-items: start;
            }

            .showcase-featured {
                position: sticky;
                top: 64px;
            }

            .showcase-featured .image-wrapper {
                position: relative;
                overflow: hidden;
                border-radius: 0px;
                cursor: zoom-in;
            }

            .showcase-featured img {
                width: 100%;
                height: auto;
                display: block;
                user-select: none;
                -webkit-user-drag: none;
            }

            .showcase-featured .image-wrapper::after {
                content: "";
                position: absolute;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                pointer-events: none;
            }

            .showcase-scroll {
                display: flex;
                flex-direction: column;
                gap: 20px;
            }

            .showcase-scroll .image-wrapper {
                position: relative;
                overflow: hidden;
                border-radius: 0px;
                cursor: zoom-in;
            }

            .showcase-scroll img {
                width: 100%;
                height: auto;
                display: block;
                user-select: none;
                -webkit-user-drag: none;
            }

            .showcase-scroll .image-wrapper::after {
                content: "";
                position: absolute;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                pointer-events: none;
            }

            .gallery {
                display: grid;
                grid-template-columns: repeat(2, 1fr);
                gap: 20px;
                margin-bottom: 120px;
            }

            .gallery-item {
                position: relative;
                border-radius: 0px;
                overflow: hidden;
                cursor: zoom-in;
            }

            .gallery-item::after {
                content: "";
                position: absolute;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                pointer-events: none;
            }

            .gallery-item.full {
                grid-column: span 2;
            }

            .gallery-item img {
                width: 100%;
                height: auto;
                display: block;
                user-select: none;
                -webkit-user-drag: none;
            }

            .image-wrapper:focus-visible,
            .gallery-item:focus-visible {
                outline: 1px solid var(--text-primary);
                outline-offset: 4px;
            }

            .image-preview {
                --preview-inline-space: 96px;
                --preview-block-space: 128px;
                position: fixed;
                inset: 0;
                z-index: 1000;
                width: 100%;
                min-height: 100vh;
                display: block;
                padding: 64px 48px;
                border: 0;
                background: var(--bg);
                cursor: zoom-out;
                appearance: none;
                color: inherit;
                font: inherit;
                text-align: inherit;
            }

            .image-preview[hidden] {
                display: none;
            }

            .image-preview-frame {
                display: flex;
                align-items: center;
                justify-content: center;
                width: min(
                    calc(100vw - var(--preview-inline-space)),
                    calc(1900px - var(--preview-inline-space))
                );
                height: calc(100vh - var(--preview-block-space));
                margin: 0 auto;
            }

            .image-preview img {
                width: auto;
                height: auto;
                max-width: 100%;
                max-height: 100%;
                display: block;
                user-select: none;
                -webkit-user-drag: none;
            }

            .section-title {
                font-size: 16px;
                color: var(--text-secondary);
                margin-bottom: 24px;
                letter-spacing: 0.05em;
                text-transform: uppercase;
            }

            .sr-only {
                position: absolute;
                width: 1px;
                height: 1px;
                padding: 0;
                margin: -1px;
                overflow: hidden;
                clip: rect(0, 0, 0, 0);
                white-space: nowrap;
                border-width: 0;
            }

            @media (max-width: 1400px) {
                .wrapper {
                    padding: 0 32px;
                }

                .image-preview {
                    --preview-inline-space: 64px;
                    padding-right: 32px;
                    padding-left: 32px;
                }

                .layout {
                    gap: 32px;
                }

                .showcase {
                    grid-template-columns: 2fr 1fr;
                }
            }

            @media (max-width: 1100px) {
                .layout {
                    grid-template-columns: 240px 1fr;
                }

                .showcase {
                    grid-template-columns: 1.8fr 1fr;
                }
            }

            @media (max-width: 900px) {
                .showcase {
                    grid-template-columns: 1fr;
                }

                .showcase-featured {
                    position: relative;
                    top: 0;
                }
            }

            @media (max-width: 768px) {
                .wrapper {
                    padding: 0 24px;
                }

                .image-preview {
                    --preview-inline-space: 48px;
                    --preview-block-space: 64px;
                    padding: 32px 24px;
                }

                .layout {
                    grid-template-columns: 1fr;
                    gap: 0;
                }

                .sidebar {
                    position: relative;
                    height: auto;
                    padding: 32px 0;
                    padding-bottom: 48px;
                }

                .theme-toggle {
                    margin-top: 32px;
                }

                .name {
                    white-space: normal;
                }

                    padding: 0 0 32px 0;
                }

                    margin-bottom: 80px;
                }

                .gallery {
                    grid-template-columns: 1fr;
                    margin-bottom: 80px;
                }

                .gallery-item.full {
                    grid-column: span 1;
                }
            }
        </style>
    </head>

        <script>
            const srOnly = document.querySelector(".sr-only");
            const themeToggle = document.querySelector(".theme-toggle");
            const themePreference = window.matchMedia(
                "(prefers-color-scheme: dark)",
            );

            function announce(message) {
                srOnly.textContent = message;
                setTimeout(() => {
                    srOnly.textContent = "";
                }, 1000);
            }

            function getTheme() {
                const selectedTheme = document.documentElement.dataset.theme;

                if (selectedTheme === "dark" || selectedTheme === "light") {
                    return selectedTheme;
                }

                return themePreference.matches ? "dark" : "light";
            }

            function updateThemeToggle() {
                const theme = getTheme();
                const nextTheme = theme === "dark" ? "light" : "dark";
                const label = `Switch to ${nextTheme} mode`;

                themeToggle.setAttribute("aria-label", label);
                themeToggle.title = label;
            }

            function getSavedTheme() {
                try {
                    return localStorage.getItem("theme");
                } catch {
                    return null;
                }
            }

            function saveTheme(theme) {
                try {
                    localStorage.setItem("theme", theme);
                } catch {
                    return;
                }
            }

            function setTheme(theme) {
                document.documentElement.dataset.theme = theme;
                saveTheme(theme);
                updateThemeToggle();
            }

            const savedTheme = getSavedTheme();
            if (savedTheme === "dark" || savedTheme === "light") {
                document.documentElement.dataset.theme = savedTheme;
            }

            updateThemeToggle();

            themePreference.addEventListener("change", () => {
                if (!document.documentElement.dataset.theme) {
                    updateThemeToggle();
                }
            });

            themeToggle.addEventListener("click", () => {
                const nextTheme = getTheme() === "dark" ? "light" : "dark";
                setTheme(nextTheme);
                themeToggle.blur();
                announce(`Switched to ${nextTheme} mode`);
            });

            // Email copy functionality
            document
                .querySelector(".email")
                .addEventListener("click", function () {
                    navigator.clipboard.writeText("hi@gildrb.com");
                    this.classList.add("copied");
                    this.blur();
                    announce("Email copied to clipboard");
                    setTimeout(() => this.classList.remove("copied"), 1500);
                });

            const imagePreview = document.querySelector(".image-preview");
            const previewImage = imagePreview.querySelector("img");
            let previouslyFocusedElement = null;

            function openImagePreview(image) {
                previouslyFocusedElement = document.activeElement;
                previewImage.src = image.currentSrc || image.src;
                previewImage.alt = image.alt;
                imagePreview.hidden = false;
                document.body.classList.add("preview-open");
                imagePreview.focus({ preventScroll: true });
                announce("Image enlarged");
            }

            function closeImagePreview() {
                if (imagePreview.hidden) return;

                imagePreview.hidden = true;
                previewImage.removeAttribute("src");
                document.body.classList.remove("preview-open");

                if (previouslyFocusedElement) {
                    previouslyFocusedElement.focus({ preventScroll: true });
                }

                announce("Image closed");
            }

            document
                .querySelectorAll(".image-wrapper, .gallery-item")
                .forEach((imageTrigger) => {
                    const image = imageTrigger.querySelector("img");
                    if (!image) return;

                    imageTrigger.setAttribute("role", "button");
                    imageTrigger.setAttribute("tabindex", "0");
                    imageTrigger.setAttribute(
                        "aria-label",
                        "Open image preview",
                    );

                    imageTrigger.addEventListener("click", () => {
                        openImagePreview(image);
                    });

                    imageTrigger.addEventListener("keydown", (e) => {
                        if (e.key !== "Enter" && e.key !== " ") return;

                        e.preventDefault();
                        openImagePreview(image);
                    });
                });

            imagePreview.addEventListener("click", closeImagePreview);

            // Disable right-click on all images
            document.querySelectorAll("img").forEach((img) => {
                img.addEventListener("contextmenu", (e) => e.preventDefault());
            });

            // Arrow key navigation
            const focusableElements = [
                ...document.querySelectorAll(".links a"),
                document.querySelector(".email"),
                themeToggle,
            ];

            document.addEventListener("keydown", function (e) {
                if (e.key === "Escape" && !imagePreview.hidden) {
                    e.preventDefault();
                    closeImagePreview();
                    return;
                }

                if (!imagePreview.hidden) return;

                if (e.key !== "ArrowUp" && e.key !== "ArrowDown") return;

                e.preventDefault();

                const activeElement = document.activeElement;
                const currentIndex = focusableElements.indexOf(activeElement);

                if (currentIndex === -1) {
                    focusableElements[0].focus();
                    return;
                }

                let nextIndex;
                if (e.key === "ArrowDown") {
                    nextIndex = (currentIndex + 1) % focusableElements.length;
                } else {
                    nextIndex =
                        (currentIndex - 1 + focusableElements.length) %
                        focusableElements.length;
                }

                focusableElements[nextIndex].focus();
            });

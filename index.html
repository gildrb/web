<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta
            name="description"
            content="Studying AI/Data Science @ JMU. Designer."
        />
        <title>Gil Rodrigues</title>
        <link
            rel="preload"
            href="fonts/OpeningHoursSans-Regular.woff2"
            as="font"
            type="font/woff2"
            crossorigin
        />
        <style>
            @font-face {
                font-family: "Opening Hours Sans";
                src: url("fonts/OpeningHoursSans-Regular.woff2") format("woff2");
                font-weight: 400;
                font-style: normal;
                font-display: swap;
            }
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }

            ::selection {
                color: #ffffff;
                background: #0028FF;
            }

            html {
                scrollbar-width: none;
                -ms-overflow-style: none;
            }

            html::-webkit-scrollbar {
                display: none;
            }

            body {
                background: #000000;
                color: #ffffff;
                font-family:
                    "Opening Hours Sans",
                    -apple-system,
                    BlinkMacSystemFont,
                    "Segoe UI",
                    "Arial",
                    sans-serif;
                font-size: 20px;
                line-height: 1.5;
                min-height: 100vh;
                padding: 64px;
                position: relative;
                -webkit-font-smoothing: antialiased;
                -moz-osx-font-smoothing: grayscale;
                text-rendering: optimizeLegibility;
                -webkit-overflow-scrolling: touch;
            }

            main {
                position: sticky;
                top: 64px;
                bottom: 64px;
            }

            .name {
                font-size: 20px;
                font-weight: 400;
                color: #ffffff;
                letter-spacing: 0.02em;
                margin-bottom: 8px;
            }

            .subtitle {
                font-size: 20px;
                font-weight: 400;
                color: #808080;
                margin-bottom: 32px;
            }

            .email {
                font-size: 20px;
                color: #808080;
                cursor: pointer;
                margin-bottom: 8px;
                width: fit-content;
                background: none;
                border: none;
                padding: 0;
                font-family: inherit;
                text-align: left;
            }

            .email::after {
                content: "";
                color: #808080;
                opacity: 1;
            }

            .email:hover,
            .email:focus {
                color: #ffffff;
                outline: none;
            }

            .email:hover::after,
            .email:focus::after {
                content: " copy";
                color: #808080;
            }

            .email.copied::after {
                content: " copied";
                color: #808080;
            }

            .links {
                font-size: 20px;
                display: flex;
                flex-direction: column;
            }

            .links a {
                color: #808080;
                text-decoration: none;
                margin-bottom: 8px;
                width: fit-content;
            }

            .links a::after {
                content: " ↗";
                color: #808080;
            }

            .links a:hover,
            .links a:focus {
                color: #ffffff;
                outline: none;
            }

            .links a:hover::after,
            .links a:focus::after {
                color: #808080;
            }

            .sr-only {
                position: absolute;
                width: 1px;
                height: 1px;
                padding: 0;
                margin: -1px;
                overflow: hidden;
                clip: rect(0, 0, 0, 0);
                white-space: nowrap;
                border-width: 0;
            }

            @media (max-width: 768px) {
                body {
                    padding: 32px;
                }

                main {
                    top: 32px;
                }
            }
        </style>
    </head>
    <body>
        <div
            class="sr-only"
            role="status"
            aria-live="polite"
            aria-atomic="true"
        ></div>
        <main id="main">
            <p class="name">gil domingos rodrigues barbosa</p>
            <p class="subtitle">student</p>
            <button class="email" aria-label="Copy email address">
                hi@gildrb.com
            </button>
            <div class="links">
                <a href="https://github.com/gildrb">github</a>
                <a href="https://www.linkedin.com/in/gildrb/">linkedin</a>
                <a href="http://behance.net/gildrb">behance</a>
                <a href="https://bsky.app/profile/gildrb.com">bluesky</a>
            </div>
        </main>
        <script>
            const srOnly = document.querySelector(".sr-only");

            function announce(message) {
                srOnly.textContent = message;
                setTimeout(() => {
                    srOnly.textContent = "";
                }, 1000);
            }

            document
                .querySelector(".email")
                .addEventListener("click", function () {
                    navigator.clipboard.writeText("hi@gildrb.com");
                    this.classList.add("copied");
                    announce("Email copied to clipboard");
                    setTimeout(() => this.classList.remove("copied"), 1500);
                });

            // Arrow key navigation
            const focusableElements = [
                document.querySelector(".email"),
                ...document.querySelectorAll(".links a"),
            ];

            document.addEventListener("keydown", function (e) {
                if (e.key !== "ArrowUp" && e.key !== "ArrowDown") return;

                const activeElement = document.activeElement;
                const currentIndex = focusableElements.indexOf(activeElement);

                if (currentIndex === -1) return;

                e.preventDefault();

                let nextIndex;
                if (e.key === "ArrowDown") {
                    nextIndex = (currentIndex + 1) % focusableElements.length;
                } else {
                    nextIndex =
                        (currentIndex - 1 + focusableElements.length) %
                        focusableElements.length;
                }

                focusableElements[nextIndex].focus();
            });
        </script>
    </body>
</html>

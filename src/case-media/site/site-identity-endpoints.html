<div class="site-media-panel site-endpoints-panel">
    <style>
        .site-endpoints-panel {
            box-sizing: border-box;
            width: 100%;
            padding: 24px;
            border: 1px solid color-mix(in srgb, var(--text-primary) 14%, transparent);
            border-radius: var(--media-radius);
            background: color-mix(in srgb, var(--bg) 94%, var(--text-primary));
            color: var(--text-secondary);
            font-family: "Geist Mono", ui-monospace, SFMono-Regular, Consolas, monospace;
            font-size: 14px;
            line-height: 20px;
        }

        .site-endpoints-title {
            display: block;
            margin-bottom: 16px;
            color: var(--text-tertiary);
        }

        .site-endpoints-list {
            display: grid;
            grid-template-columns: minmax(0, 1fr) minmax(0, 1.5fr);
            gap: 8px 20px;
        }

        .site-endpoint {
            color: var(--text-primary);
        }

        .site-endpoint-label {
            color: var(--text-secondary);
        }

        @media (max-width: 560px) {
            .site-endpoints-list {
                grid-template-columns: 1fr;
                gap: 4px;
            }

            .site-endpoint-label {
                margin-bottom: 8px;
            }
        }
    </style>
    <span class="site-endpoints-title">MACHINE-READABLE IDENTITY</span>
    <div class="site-endpoints-list">
        <span class="site-endpoint">JSON-LD</span><span class="site-endpoint-label">identity graph</span>
        <span class="site-endpoint">WebFinger</span><span class="site-endpoint-label">identity discovery</span>
        <span class="site-endpoint">host-meta</span><span class="site-endpoint-label">host metadata</span>
        <span class="site-endpoint">llms.txt</span><span class="site-endpoint-label">AI-readable profile</span>
        <span class="site-endpoint">RSS</span><span class="site-endpoint-label">updates feed</span>
        <span class="site-endpoint">humans.txt</span><span class="site-endpoint-label">human authorship</span>
        <span class="site-endpoint">sitemap</span><span class="site-endpoint-label">route discovery</span>
        <span class="site-endpoint">Content-Signal</span><span class="site-endpoint-label">usage headers</span>
    </div>
</div>

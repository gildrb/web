<div class="site-tokens">
    <div class="site-token-grid">
        <div class="site-token-chip" style="--token-bg: #000000;">
            <span class="site-token-swatch" aria-hidden="true"></span>
            <span class="site-token-name">--bg</span>
            <span class="site-token-value">#000000</span>
        </div>
        <div class="site-token-chip" style="--token-bg: #ffffff;">
            <span class="site-token-swatch" aria-hidden="true"></span>
            <span class="site-token-name">--text-primary</span>
            <span class="site-token-value">#ffffff</span>
        </div>
        <div class="site-token-chip" style="--token-bg: #b3b3b3;">
            <span class="site-token-swatch" aria-hidden="true"></span>
            <span class="site-token-name">--text-secondary</span>
            <span class="site-token-value">#b3b3b3</span>
        </div>
        <div class="site-token-chip" style="--token-bg: #767676;">
            <span class="site-token-swatch" aria-hidden="true"></span>
            <span class="site-token-name">--text-tertiary</span>
            <span class="site-token-value">#767676</span>
        </div>
        <div class="site-token-chip" style="--token-bg: #b3b3b3;">
            <span class="site-token-swatch" aria-hidden="true"></span>
            <span class="site-token-name">--highlight-bg</span>
            <span class="site-token-value">#b3b3b3</span>
        </div>
        <div class="site-token-chip" style="--token-bg: #ffffff;">
            <span class="site-token-swatch" aria-hidden="true"></span>
            <span class="site-token-name">--highlight-text</span>
            <span class="site-token-value">#ffffff</span>
        </div>
    </div>
    <div class="site-token-subsection">
        <p class="site-token-label">Type ramp</p>
        <div class="site-type-ramp">
            <span class="site-type-title">28/36 title</span>
            <span class="site-type-heading">24/32 heading</span>
            <span class="site-type-body">16/24 body</span>
            <span class="site-type-caption">14/20 caption</span>
        </div>
    </div>
    <div class="site-token-subsection">
        <p class="site-token-label">4px scale</p>
        <div class="site-spacing-scale" aria-label="4, 8, 12, 16, 24, 32, 48 pixel spacing scale">
            <span class="site-spacing-bar" style="--bar-height: 8px;">4</span>
            <span class="site-spacing-bar" style="--bar-height: 16px;">8</span>
            <span class="site-spacing-bar" style="--bar-height: 24px;">12</span>
            <span class="site-spacing-bar" style="--bar-height: 32px;">16</span>
            <span class="site-spacing-bar" style="--bar-height: 48px;">24</span>
            <span class="site-spacing-bar" style="--bar-height: 56px;">32</span>
            <span class="site-spacing-bar" style="--bar-height: 64px;">48</span>
        </div>
    </div>
</div>

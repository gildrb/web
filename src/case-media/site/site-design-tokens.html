<div class="site-tokens">
    <style>
        .site-tokens {
            width: 100%;
            color: var(--text-secondary);
        }
        .site-token-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 12px 24px;
            font-family: "Geist Mono", ui-monospace, SFMono-Regular, Consolas, monospace;
            font-size: 14px;
            line-height: 20px;
        }
        .site-token {
            display: grid;
            grid-template-columns: 12px minmax(0, 1fr);
            column-gap: 8px;
            align-items: center;
            min-width: 0;
        }
        .site-token-chip {
            display: block;
            box-sizing: border-box;
            width: 12px;
            height: 12px;
            background: var(--chip-color);
            border: 1px solid color-mix(in srgb, var(--text-primary) 22%, transparent);
        }
        .site-token-name {
            color: var(--text-primary);
        }
        .site-token-value {
            color: var(--text-secondary);
        }
        .site-token-subsection {
            margin-top: 48px;
        }
        .site-type-ramp {
            display: grid;
            gap: 8px;
            color: var(--text-primary);
        }
        .site-type-ramp span {
            display: block;
        }
        .site-type-title {
            font-size: 28px;
            line-height: 36px;
        }
        .site-type-heading {
            font-size: 24px;
            line-height: 32px;
        }
        .site-type-body {
            font-size: 16px;
            line-height: 24px;
        }
        .site-type-caption {
            color: var(--text-tertiary);
            font-size: 14px;
            line-height: 20px;
        }
        .site-spacing-scale {
            display: flex;
            align-items: end;
            gap: 8px;
            height: 64px;
        }
        .site-spacing-bar {
            display: flex;
            align-items: end;
            justify-content: center;
            width: 24px;
            height: var(--bar-height);
            color: var(--text-primary);
            background: var(--highlight-bg);
            font-family: "Geist Mono", ui-monospace, SFMono-Regular, Consolas, monospace;
            font-size: 10px;
            line-height: 12px;
        }
        @media (max-width: 560px) {
            .site-token-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
    <div class="site-token-grid">
        <div class="site-token">
            <span class="site-token-chip" style="--chip-color: #000000;" aria-hidden="true"></span>
            <span><span class="site-token-name">--bg</span> <span class="site-token-value">#000000</span></span>
        </div>
        <div class="site-token">
            <span class="site-token-chip" style="--chip-color: #ffffff;" aria-hidden="true"></span>
            <span><span class="site-token-name">--text-primary</span> <span class="site-token-value">#ffffff</span></span>
        </div>
        <div class="site-token">
            <span class="site-token-chip" style="--chip-color: #b3b3b3;" aria-hidden="true"></span>
            <span><span class="site-token-name">--text-secondary</span> <span class="site-token-value">#b3b3b3</span></span>
        </div>
        <div class="site-token">
            <span class="site-token-chip" style="--chip-color: #767676;" aria-hidden="true"></span>
            <span><span class="site-token-name">--text-tertiary</span> <span class="site-token-value">#767676</span></span>
        </div>
        <div class="site-token">
            <span class="site-token-chip" style="--chip-color: #b3b3b3;" aria-hidden="true"></span>
            <span><span class="site-token-name">--highlight-bg</span> <span class="site-token-value">#b3b3b3</span></span>
        </div>
        <div class="site-token">
            <span class="site-token-chip" style="--chip-color: #ffffff;" aria-hidden="true"></span>
            <span><span class="site-token-name">--highlight-text</span> <span class="site-token-value">#ffffff</span></span>
        </div>
    </div>
    <div class="site-token-subsection">
        <div class="site-type-ramp">
            <span class="site-type-title">28/36 title</span>
            <span class="site-type-heading">24/32 heading</span>
            <span class="site-type-body">16/24 body</span>
            <span class="site-type-caption">14/20 caption</span>
        </div>
    </div>
    <div class="site-token-subsection">
        <div class="site-spacing-scale" aria-label="4, 8, 12, 16, 24, 32, 48 pixel spacing scale">
            <span class="site-spacing-bar" style="--bar-height: 8px;">4</span>
            <span class="site-spacing-bar" style="--bar-height: 16px;">8</span>
            <span class="site-spacing-bar" style="--bar-height: 24px;">12</span>
            <span class="site-spacing-bar" style="--bar-height: 32px;">16</span>
            <span class="site-spacing-bar" style="--bar-height: 48px;">24</span>
            <span class="site-spacing-bar" style="--bar-height: 56px;">32</span>
            <span class="site-spacing-bar" style="--bar-height: 64px;">48</span>
        </div>
    </div>
</div>

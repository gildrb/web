<div class="site-media-panel site-tokens-panel">
    <style>
        .site-tokens-panel {
            box-sizing: border-box;
            width: 100%;
            padding: 24px;
            border: 1px solid color-mix(in srgb, var(--text-primary) 14%, transparent);
            border-radius: var(--media-radius);
            background: color-mix(in srgb, var(--bg) 94%, var(--text-primary));
            color: var(--text-secondary);
        }

        .site-token-heading {
            margin: 0 0 16px;
            color: var(--text-tertiary);
            font-size: 14px;
            font-weight: 400;
            line-height: 20px;
        }

        .site-token-grid {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 12px;
        }

        .site-token-swatch {
            min-width: 0;
            min-height: 72px;
            padding: 10px;
            border: 1px solid color-mix(in srgb, var(--text-primary) 14%, transparent);
            border-radius: 8px;
            color: var(--swatch-text, #ffffff);
            background: var(--swatch-bg);
            font-family: "Geist Mono", ui-monospace, SFMono-Regular, Consolas, monospace;
            font-size: 12px;
            line-height: 16px;
        }

        .site-token-swatch span {
            display: block;
        }

        .site-token-swatch span + span {
            margin-top: 4px;
            opacity: 0.8;
        }

        .site-token-subsection {
            margin-top: 24px;
        }

        .site-type-ramp {
            display: grid;
            gap: 8px;
            color: var(--text-primary);
        }

        .site-type-ramp span {
            display: block;
        }

        .site-type-title {
            font-size: 28px;
            line-height: 36px;
        }

        .site-type-heading {
            font-size: 24px;
            line-height: 32px;
        }

        .site-type-body {
            font-size: 16px;
            line-height: 24px;
        }

        .site-type-caption {
            color: var(--text-tertiary);
            font-size: 14px;
            line-height: 20px;
        }

        .site-spacing-scale {
            display: flex;
            align-items: end;
            gap: 8px;
            height: 64px;
        }

        .site-spacing-bar {
            display: flex;
            align-items: end;
            justify-content: center;
            width: 24px;
            height: var(--bar-height);
            color: var(--text-primary);
            background: var(--highlight-bg);
            font-family: "Geist Mono", ui-monospace, SFMono-Regular, Consolas, monospace;
            font-size: 10px;
            line-height: 12px;
        }

        @media (max-width: 560px) {
            .site-token-grid {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }
        }
    </style>
    <p class="site-token-heading">DESIGN TOKENS</p>
    <div class="site-token-grid">
        <div class="site-token-swatch" style="--swatch-bg: #000000;">
            <span>--bg</span><span>#000000</span>
        </div>
        <div class="site-token-swatch" style="--swatch-bg: #ffffff; --swatch-text: #000000;">
            <span>--text-primary</span><span>#ffffff</span>
        </div>
        <div class="site-token-swatch" style="--swatch-bg: #b3b3b3; --swatch-text: #000000;">
            <span>--text-secondary</span><span>#b3b3b3</span>
        </div>
        <div class="site-token-swatch" style="--swatch-bg: #767676;">
            <span>--text-tertiary</span><span>#767676</span>
        </div>
        <div class="site-token-swatch" style="--swatch-bg: #b3b3b3; --swatch-text: #000000;">
            <span>--highlight-bg</span><span>#b3b3b3</span>
        </div>
        <div class="site-token-swatch" style="--swatch-bg: #ffffff; --swatch-text: #000000;">
            <span>--highlight-text</span><span>#ffffff</span>
        </div>
    </div>
    <div class="site-token-subsection">
        <p class="site-token-heading">TYPE RAMP</p>
        <div class="site-type-ramp">
            <span class="site-type-title">28/36 title</span>
            <span class="site-type-heading">24/32 heading</span>
            <span class="site-type-body">16/24 body</span>
            <span class="site-type-caption">14/20 caption</span>
        </div>
    </div>
    <div class="site-token-subsection">
        <p class="site-token-heading">4PX SCALE</p>
        <div class="site-spacing-scale" aria-label="4, 8, 12, 16, 24, 32, 48 pixel spacing scale">
            <span class="site-spacing-bar" style="--bar-height: 8px;">4</span>
            <span class="site-spacing-bar" style="--bar-height: 16px;">8</span>
            <span class="site-spacing-bar" style="--bar-height: 24px;">12</span>
            <span class="site-spacing-bar" style="--bar-height: 32px;">16</span>
            <span class="site-spacing-bar" style="--bar-height: 48px;">24</span>
            <span class="site-spacing-bar" style="--bar-height: 56px;">32</span>
            <span class="site-spacing-bar" style="--bar-height: 64px;">48</span>
        </div>
    </div>
</div>
